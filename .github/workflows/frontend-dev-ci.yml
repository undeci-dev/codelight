name: frontend-dev-ci

on:
  pull_request:
    branches: ["dev"]
    paths:
      - "frontend/**"

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    runs-on: codelight-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests (if exists)
        run: npm test -- --run --passWithNoTests
        continue-on-error: true

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Check build output
        run: |
          echo "Build completed successfully"
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

      - name: Upload build size report
        uses: actions/upload-artifact@v4
        with:
          name: build-size-report
          path: frontend/dist/**/*.{js,css}
          retention-days: 7
